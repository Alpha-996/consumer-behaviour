<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consumer Behaviour</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4ef;
    --paper: #fffdf7;
    --ink: #1a1a18;
    --muted: #5a5a52;
    --accent: #c84b2f;
    --accent2: #2f6dc8;
    --accent3: #2a8c55;
    --rule: #d8d6cc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--ink);
    font-size: 14px;
    line-height: 1.6;
    padding: 32px 20px;
  }

  .page {
    max-width: 900px;
    margin: 0 auto;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    padding: 40px 48px;
    position: relative;
  }

  .header {
    border-bottom: 3px solid var(--ink);
    padding-bottom: 16px;
    margin-bottom: 28px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .header-left h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }
  .header-left .sub {
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .header-right {
    text-align: right;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.8;
  }

  .section { margin-bottom: 36px; }

  .section-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink);
    border-bottom: 1px solid var(--rule);
    padding-bottom: 6px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .num {
    background: var(--ink);
    color: var(--paper);
    font-size: 11px;
    padding: 2px 6px;
    font-weight: 600;
  }

  .link-list {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .link-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border: 1px solid var(--rule);
    background: var(--paper);
    text-decoration: none;
    color: var(--ink);
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
  }
  .link-item:hover {
    border-color: var(--accent2);
    background: #f0f4ff;
  }
  .link-item .arrow {
    font-size: 16px;
    transition: transform 0.2s;
    color: var(--muted);
  }
  .link-item:hover .arrow {
    transform: translateX(4px);
    color: var(--accent2);
  }

  /* Syllabus items — highlighted with accent */
  .link-item.syllabus {
    border-color: var(--accent);
    background: #fff8f5;
  }
  .link-item.syllabus:hover {
    border-color: var(--accent);
    background: #fff0ec;
  }
  .link-item.syllabus .arrow {
    color: var(--accent);
  }
  .link-item.syllabus:hover .arrow {
    color: var(--accent);
  }
  .link-item.syllabus .tag {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    letter-spacing: 0.5px;
    margin-right: 8px;
  }

  .note {
    margin-top: 40px;
    padding-top: 16px;
    border-top: 1px solid var(--rule);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }

  @media (max-width: 768px) {
    body { padding: 16px; }
    .page { padding: 24px; }
    .header { flex-direction: column; align-items: flex-start; gap: 16px; }
    .header-right { text-align: left; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-left">
      <h1>Consumer Behaviour</h1>
      <div class="sub">Course Resources</div>
    </div>
    <div class="header-right">
      Course Outline<br>
      <strong>University & Book Content</strong><br>
      Chapter-wise Notes
    </div>
  </div>

  <!-- Syllabus section — highlighted -->
  <div class="section">
    <div class="section-title"><span class="num">01</span>Syllabus</div>
    <div class="link-list">
      <a href="consumer-behaviour-syllabus.html" class="link-item syllabus">
        <span><span class="tag">Syllabus</span>Complete Chapter-wise Content List</span>
        <span class="arrow">→</span>
      </a>
    </div>
  </div>

  <!-- Chapters section — normal items (add future chapter links here) -->
  <div class="section">
    <div class="section-title"><span class="num">02</span>Chapters</div>
    <div class="link-list">
      <!-- Future chapter links will go here, e.g.:
      <a href="chapter-1.html" class="link-item">
        <span>Chapter 1 — Consumer Behaviour</span>
        <span class="arrow">→</span>
      </a>
      -->
    </div>
  </div>

  <div class="note">More chapters coming soon</div>

</div>
</body>
</html>
